services:

  # ── PostgreSQL 15 ─────────────────────────────────
  postgres:
    image: postgres:15
    container_name: urlshortener_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=urlshortener
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - TZ=Asia/Kolkata
      - POSTGRES_INITDB_ARGS=--timezone=Asia/Kolkata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - urlshortener_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urlshortener"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: urlshortener_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - urlshortener_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Volumes ───────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ── Network ───────────────────────────────────────
networks:
  urlshortener_network:
    driver: bridge